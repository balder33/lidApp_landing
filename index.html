document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nutes, just by chatting', offer2:'Every dollar tracked, automatically', offer3:'A coach that nudges — never nags',\n    micro:'iPhone · Free to start · No spreadsheets, ever',\n    footTag:'Your AI money coach.', heroLabel:'First screen',\n  },\n  fr: {\n    nav_how:'Comment ça marche', nav_why:'Pourquoi Lid', cta:'Obtenir l’app', dlOn:'Télécharger sur l’',\n    eyebrowA:'Coach financier IA · iPhone',\n    h1A_1:'Tu gagnes bien ta vie.', h1A_2:'Alors où passe l’argent avant la fin du mois ?',\n    subA:'Ton relevé bancaire montre les montants — jamais la raison. Lid est un coach IA qui note chaque dollar par message et t’explique, simplement, où l’argent est parti.',\n    eyebrowB:'Voici Lid · Coach financier IA',\n    h1B_1:'Un seul chiffre honnête :', h1B_2:'ce que tu peux dépenser aujourd’hui.',\n    subB:'Lid met de côté le loyer, l’épicerie et ton épargne d’abord — puis t’affiche un seul chiffre pour aujourd’hui. Aucun tableur. Juste un coach dans ta poche.',\n    ctaSecondary:'Voir comment ça marche', reassure:'Gratuit au départ · Prêt en 3 minutes',\n    painsKicker:'Ça te parle ?',\n    painsTitle:'Ce n’est pas que tu gères mal l’argent. Il manque juste un système.',\n    pain1t:'La paie fait du bien. La fin du mois, moins.', pain1b:'Bon mois ou mauvais mois, le solde finit près de zéro.',\n    pain2t:'L’argent a disparu — impossible de dire où.', pain2b:'« Encore ? » Le relevé liste des montants, jamais des raisons.',\n    pain3t:'Tu sais quoi faire. Mais tu ne le fais pas.', pain3b:'Et tu traînes une petite honte silencieuse.',\n    stmtLabel:'TON RELEVÉ BANCAIRE', stmtFoot:'…et donc ? pourquoi encore ?',\n    lidInsight:'Les livraisons ont bondi de 52 % ce mois-ci — presque toutes en soirée de semaine. Grosse semaine ? On plafonne le « resto » ?',\n    contrastCap:'Mêmes données. Une seule aide vraiment.',\n    benKicker:'Pourquoi Lid',\n    benTitle:'Une app de finances enfin humaine',\n    benSub:'Aucun budget à surveiller. Aucune culpabilité. Juste un coach qui fait le travail et parle comme une vraie personne.',\n    ben1t:'Noter comme un texto', ben1b:'Écris-le, photographie le reçu ou dis-le. Lid classe chaque dollar pour toi.',\n    ben2t:'Chaque dollar a un rôle', ben2b:'Lid crée des enveloppes pour le loyer, l’épicerie, les impôts et ton coussin — automatiquement.',\n    ben3t:'Un objectif visible', ben3b:'Lid propose un objectif et montre où tu en es — en jalons humains, pas en points ni badges.',\n    ben4t:'Pensé pour les revenus variables', ben4b:'Pigiste ou saisonnier ? Lid planifie selon ton vrai solde, après chaque paiement.',\n    hiwKicker:'Comment ça marche',\n    hiwL1:'De', hiwQ1:'« où est passé l’argent ? »', hiwL2:'à', hiwQ2:'« je gère »',\n    hiwSub:'Cinq petits moments. C’est toute l’app.',\n    step1tag:'01 · Départ', step1t:'Une conversation de 3 minutes, pas un formulaire', step1b:'Lid demande comment l’argent rentre et ce qui te stresse — puis crée tes comptes et un premier objectif à partir de tes réponses. Tu n’as qu’à approuver.',\n    step2tag:'02 · Saisie', step2t:'Ajoute une dépense comme un message', step2b:'« Café 4,85 ». Lid comprend, range dans la bonne enveloppe et confirme — aucun formulaire, aucune catégorie à choisir.',\n    step3tag:'03 · Reçus', step3t:'Photographie, Lid répartit', step3b:'Prends un reçu en photo : Lid lit chaque ligne et trie épicerie et dépenses courantes au bon endroit.',\n    step4tag:'04 · Clarté', step4t:'Vois où l’argent est vraiment allé', step4b:'Des constats en langage clair par-dessus des graphiques simples : ce qui a changé, quand, et la raison bien humaine derrière.',\n    step5tag:'05 · Bilan', step5t:'Un bilan hebdo de deux minutes', step5b:'Chaque dimanche, la version courte de ta semaine — les bons coups d’abord. Lid s’en souvient et fait un suivi.',\n    offerKicker:'Commence aujourd’hui',\n    offerTitle:'Comprends enfin où va ton argent — et mets de côté tes premiers 5 000 $ en 6 mois.',\n    offerSub:'Télécharge Lid, réponds à quelques questions par message et regarde-le bâtir ton plan. Gratuit au départ.',\n    offer1:'Prêt en 3 minutes, juste en discutant', offer2:'Chaque dollar suivi, automatiquement', offer3:'Un coach qui rappelle — sans harceler',\n    micro:'iPhone · Gratuit au départ · Jamais de tableur',\n    footTag:'Ton coach financier IA.', heroLabel:'Premier écran',\n  },\n  ru: {\n    nav_how:'Как это работает', nav_why:'Почему Lid', cta:'Скачать', dlOn:'Загрузить в',\n    eyebrowA:'AI-коуч по деньгам · iPhone',\n    h1A_1:'Зарабатываешь нормально.', h1A_2:'А к концу месяца на счёте пусто?',\n    subA:'Банковская выписка показывает суммы — но не ответ. Lid — это AI-коуч: записывает каждый рубль прямо в чате и по-человечески объясняет, куда снова делись деньги.',\n    eyebrowB:'Знакомься, Lid · AI-коуч по деньгам',\n    h1B_1:'Одна честная цифра:', h1B_2:'сколько можно потратить сегодня.',\n    subB:'Lid сначала откладывает на аренду, продукты и твою подушку — а потом показывает одну цифру на сегодня. Никаких таблиц. Просто коуч в кармане.',\n    ctaSecondary:'Посмотреть, как работает', reassure:'Бесплатно для старта · Настройка за 3 минуты',\n    painsKicker:'Знакомо?',\n    painsTitle:'Дело не в том, что ты не умеешь с деньгами. Просто нет системы.',\n    pain1t:'Зарплата — кайф. Конец месяца — нет.', pain1b:'Месяц хороший или плохой — баланс всё равно у нуля.',\n    pain2t:'Деньги ушли — а куда, не скажешь.', pain2b:'«Опять?» Выписка показывает суммы, но не причины.',\n    pain3t:'Ты знаешь, как надо. Просто делаешь наоборот.', pain3b:'И носишь за это тихий стыд.',\n    stmtLabel:'ТВОЯ БАНКОВСКАЯ ВЫПИСКА', stmtFoot:'…и что? почему опять?',\n    lidInsight:'Доставки выросли на 52% за месяц — почти всё по будням вечером. Тяжёлая неделя? Поставим лимит на «Еду вне дома»?',\n    contrastCap:'Одни и те же данные. Помогает только одно.',\n    benKicker:'Почему Lid',\n    benTitle:'Приложение о деньгах, которое наконец по-человечески',\n    benSub:'Никаких бюджетов, за которыми надо следить. Без чувства вины. Просто коуч, который делает работу и говорит как человек.',\n    ben1t:'Записывай как сообщение другу', ben1b:'Напиши, сфоткай чек или скажи голосом. Lid сам разложит каждый рубль.',\n    ben2t:'У каждого рубля своя задача', ben2b:'Lid сам создаёт конверты на аренду, продукты, налоги и подушку — автоматически.',\n    ben3t:'Цель, которую видно', ben3b:'Lid предложит цель и покажет, насколько ты близко — по-человечески, без баллов и значков.',\n    ben4t:'Сделан для плавающего дохода', ben4b:'Фриланс или сезон? Lid планирует от твоего реального баланса — после каждой выплаты.',\n    hiwKicker:'Как это работает',\n    hiwL1:'От', hiwQ1:'«куда ушли деньги?»', hiwL2:'к', hiwQ2:'«я держу всё под контролем»',\n    hiwSub:'Пять маленьких моментов. Это всё приложение.',\n    step1tag:'01 · Старт', step1t:'Разговор на 3 минуты, а не анкета', step1b:'Lid спросит, как приходят деньги и что тревожит — и сам создаст счета и первую цель из твоих ответов. Тебе остаётся нажать «ок».',\n    step2tag:'02 · Запись', step2t:'Добавь трату как сообщение', step2b:'«Кофе 350». Lid поймёт, положит в нужный конверт и подтвердит — без форм и выбора категорий.',\n    step3tag:'03 · Чеки', step3t:'Сфоткай — Lid разложит', step3b:'Сфотографируй чек, и Lid прочитает каждую строку, разложив продукты и повседневное по местам.',\n    step4tag:'04 · Ясность', step4t:'Увидь, куда реально ушли деньги', step4b:'Понятные выводы поверх простых графиков: что изменилось, когда и по какой человеческой причине.',\n    step5tag:'05 · Итоги', step5t:'Недельный разбор на две минуты', step5b:'Каждое воскресенье — короткая версия недели, сначала победы. Lid запомнит и спросит на следующей неделе.',\n    offerKicker:'Начни сегодня',\n    offerTitle:'Наконец поймёшь, куда уходят деньги — и накопишь первые $5000 за 6 месяцев.',\n    offerSub:'Скачай Lid, ответь на пару вопросов в чате и смотри, как он строит твой план. Бесплатно для старта.',\n    offer1:'Настройка за 3 минуты, просто в чате', offer2:'Каждый рубль учтён автоматически', offer3:'Коуч, который напоминает — а не пилит',\n    micro:'iPhone · Бесплатно для старта · Никаких таблиц',\n    footTag:'Твой AI-коуч по деньгам.', heroLabel:'Первый экран',\n  },\n};\n\nclass Component extends DCLogic {\n  state = { lang: 'fr', hero: 'A', step: 0, theme: 'light' };\n\n  componentDidMount(){ this._applyTheme(); this._applyHeroShot(); }\n  _applyHeroShot(){\n    try {\n      const apply = () => {\n        const el = document.getElementById('lidHeroShot');\n        if (el && window.LID_SCREENS && window.LID_SCREENS['01-screen']) {\n          el.style.backgroundImage = \"url('\" + window.LID_SCREENS['01-screen'] + \"')\";\n          this.forceUpdate(); // let step images pick up inlined data URIs too\n          return true;\n        }\n        return false;\n      };\n      if (!apply()) {\n        let tries = 0;\n        const t = setInterval(() => { if (apply() || ++tries > 40) clearInterval(t); }, 50);\n      }\n    } catch (e) {}\n  }\n  componentDidUpdate(){ this._applyTheme(); }\n  _applyTheme(){ try { document.body.setAttribute('data-theme', this.state.theme); } catch (e) {} }\n\n  renderVals() {\n    const { lang, hero, theme } = this.state;\n    const c = DICT[lang];\n    const N = 5;\n    const steps = [\n      { tag: c.step1tag, t: c.step1t, b: c.step1b, img: '03-screen' },\n      { tag: c.step2tag, t: c.step2t, b: c.step2b, img: '01-screen' },\n      { tag: c.step3tag, t: c.step3t, b: c.step3b, img: '04-screen' },\n      { tag: c.step4tag, t: c.step4t, b: c.step4b, img: '07-screen' },\n      { tag: c.step5tag, t: c.step5t, b: c.step5b, img: '06-screen' },\n    ];\n    const i = ((this.state.step % N) + N) % N;\n    const s = steps[i];\n    const dots = steps.map((_, idx) => ({\n      color: idx === i ? 'var(--accent)' : 'var(--dot-off)',\n      w: idx === i ? '24px' : '8px',\n      go: () => this.setState({ step: idx }),\n    }));\n    return {\n      c,\n      lang, hero,\n      stepTextAnim: i % 2 === 0 ? 'lidTxtA' : 'lidTxtB',\n      stepImgAnim: i % 2 === 0 ? 'lidImgA' : 'lidImgB',\n      stepTag: s.tag, stepTitle: s.t, stepBody: s.b,\n      stepImg: \"url('\" + ((typeof window !== 'undefined' && window.LID_SCREENS && window.LID_SCREENS[s.img]) || ('landing-assets/' + s.img + '.png')) + \"')\",\n      stepCounter: '0' + (i + 1) + ' / 0' + N,\n      dots,\n      prev: () => this.setState(st => ({ step: ((st.step - 1) % N + N) % N })),\n      next: () => this.setState(st => ({ step: (st.step + 1) % N })),\n      isHeroA: hero === 'A', isHeroB: hero === 'B',\n      setEN: () => this.setState({ lang: 'en' }),\n      setFR: () => this.setState({ lang: 'fr' }),\n      setRU: () => this.setState({ lang: 'ru' }),\n      ruColor: lang === 'ru' ? 'var(--text)' : 'var(--text-4)',\n      setLight: () => this.setState({ theme: 'light' }),\n      setDark: () => this.setState({ theme: 'dark' }),\n      themeThumb: theme === 'light' ? 'translateX(0%)' : 'translateX(100%)',\n      lightColor: theme === 'light' ? 'var(--accent)' : 'var(--text-4)',\n      darkColor: theme === 'dark' ? 'var(--accent)' : 'var(--text-4)',\n      setHeroA: () => this.setState({ hero: 'A' }),\n      setHeroB: () => this.setState({ hero: 'B' }),\n      langThumb: lang === 'en' ? 'translateX(0%)' : 'translateX(100%)',\n      heroThumb: hero === 'A' ? 'translateX(0%)' : 'translateX(100%)',\n      enColor: lang === 'en' ? 'var(--text)' : 'var(--text-4)',\n      frColor: lang === 'fr' ? 'var(--text)' : 'var(--text-4)',\n      aColor: hero === 'A' ? '#FFFFFF' : 'var(--text-3)',\n      bColor: hero === 'B' ? '#FFFFFF' : 'var(--text-3)',\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
